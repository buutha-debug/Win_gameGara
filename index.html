<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>المستوى ١: النظام المستمر</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #ui {
            position: absolute; bottom: 20px; left: 20px; color: #444; /* لون خافت غير ملفت */
            background: rgba(0,0,0,0.5); padding: 10px; border: 1px solid #222;
            pointer-events: none; z-index: 1000; font-size: 12px;
        }
        #glitch-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; opacity: 0; pointer-events: none; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="ui">
        النظام: نشط<br>
        مدة_التشغيل: <span id="runtime">00:00:00</span><br>
        الموقع_الفيزيائي: <span id="pos">0</span>
    </div>
    <div id="glitch-overlay"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- إعدادات مخفية ---
        const TRIGGER_HOURS = 100;
        const MS_PER_HOUR = 3600000;
        let startTime = localStorage.getItem('session_start');

        if (!startTime) {
            startTime = Date.now();
            localStorage.setItem('session_start', startTime);
        } else {
            startTime = parseInt(startTime);
        }

        // --- المشهد 3D ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const grid = new THREE.GridHelper(300, 60, 0x111111, 0x050505);
        scene.add(grid);

        function createOutlinedBox(w, h, d) {
            const group = new THREE.Group();
            const geometry = new THREE.BoxGeometry(w, h, d);
            const material = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const mesh = new THREE.Mesh(geometry, material);
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 }));
            group.add(mesh, line);
            return group;
        }

        const wall = createOutlinedBox(10, 10, 1);
        wall.position.set(0, 5, -15);
        scene.add(wall);

        const character = new THREE.Group();
        const bodyGroup = new THREE.Group();
        const head = createOutlinedBox(0.7, 0.7, 0.7); head.position.y = 3.6;
        const torso = createOutlinedBox(1.1, 1.5, 0.6); torso.position.y = 2.4;
        const armLPivot = new THREE.Group(); armLPivot.position.set(-0.8, 3, 0);
        armLPivot.add(createOutlinedBox(0.35, 1.3, 0.35)); armLPivot.children[0].position.y = -0.65;
        const armRPivot = new THREE.Group(); armRPivot.position.set(0.8, 3, 0);
        armRPivot.add(createOutlinedBox(0.35, 1.3, 0.35)); armRPivot.children[0].position.y = -0.65;
        const legLPivot = new THREE.Group(); legLPivot.position.set(-0.35, 1.6, 0);
        legLPivot.add(createOutlinedBox(0.45, 1.6, 0.45)); legLPivot.children[0].position.y = -0.8;
        const legRPivot = new THREE.Group(); legRPivot.position.set(0.35, 1.6, 0);
        legRPivot.add(createOutlinedBox(0.45, 1.6, 0.45)); legRPivot.children[0].position.y = -0.8;

        bodyGroup.add(head, torso, armLPivot, armRPivot);
        character.add(bodyGroup, legLPivot, legRPivot);
        scene.add(character);

        camera.position.set(12, 8, 15);
        camera.lookAt(0, 2, -5);

        let zPos = 10;
        let isPassed = false;
        let isGlitching = false;

        function animate() {
            requestAnimationFrame(animate);
            
            const now = Date.now();
            const elapsedMs = now - startTime;
            const elapsedHours = elapsedMs / MS_PER_HOUR;

            // تحديث عداد التشغيل (بصيغة ساعات:دقائق:ثواني)
            const totSec = Math.floor(elapsedMs / 1000);
            const h = String(Math.floor(totSec / 3600)).padStart(2, '0');
            const m = String(Math.floor((totSec % 3600) / 60)).padStart(2, '0');
            const s = String(totSec % 60).padStart(2, '0');
            document.getElementById('runtime').innerText = `${h}:${m}:${s}`;

            let cycle = Date.now() * 0.005;

            // فيزيائية الحركة والارتطام
            if (elapsedHours < TRIGGER_HOURS) {
                if (zPos > -13.6) {
                    zPos -= 0.08;
                } else {
                    zPos = -13.6; // توقف تام أمام الجدار
                }
                
                // أنيميشن مشي طبيعي مستمر (حتى عند الارتطام)
                legLPivot.rotation.x = Math.sin(cycle) * 0.5;
                legRPivot.rotation.x = -Math.sin(cycle) * 0.5;
                armLPivot.rotation.x = -Math.sin(cycle) * 0.4;
                armRPivot.rotation.x = Math.sin(cycle) * 0.4;
                bodyGroup.position.y = Math.abs(Math.cos(cycle * 2)) * 0.15;
            } else if (!isPassed) {
                // العبور (الخطأ المخفي يحدث هنا)
                if (!isGlitching) {
                    isGlitching = true;
                    setTimeout(() => { zPos = -30; isPassed = true; }, 1500);
                }
                character.position.x = (Math.random() - 0.5) * 0.3;
                document.getElementById('glitch-overlay').style.opacity = Math.random() * 0.2;
            } else {
                zPos = -30;
                // بعد العبور يكمل المشي في الفراغ خلف الجدار
                legLPivot.rotation.x = Math.sin(cycle) * 0.5;
                legRPivot.rotation.x = -Math.sin(cycle) * 0.5;
                bodyGroup.position.y = Math.abs(Math.cos(cycle * 2)) * 0.15;
            }

            character.position.z = zPos;
            document.getElementById('pos').innerText = zPos.toFixed(2);
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
